<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEXT BATTLEGROUNDS v0.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; margin: 0; overflow: hidden; }
        .log-window::-webkit-scrollbar { width: 4px; }
        .log-window::-webkit-scrollbar-thumb { background: #334155; }
        .sector { transition: all 0.2s; aspect-ratio: 1/1; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border-radius: 4px; }
        .closed { background-color: #450a0a !important; border-color: #7f1d1d !important; color: #f87171; opacity: 0.8; }
        .is-me { background-color: #065f46 !important; border-color: #10b981 !important; color: #fff; box-shadow: inset 0 0 10px #10b981; }
        .hidden { display: none !important; }
        #lobbyScreen { position: fixed; inset: 0; background-color: #0f172a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal { position: fixed; inset: 0; background-color: rgba(0,0,0,0.9); z-index: 200; display: flex; flex-direction: column; padding: 1.5rem; }
    </style>
</head>
<body class="h-screen flex flex-col p-2 max-w-lg mx-auto">

    <div id="lobbyScreen">
        <h1 class="text-3xl font-black text-amber-500 italic mb-1">TEXT BATTLEGROUNDS</h1>
        <p class="text-slate-500 text-[9px] mb-10 uppercase tracking-tighter">Survivor Terminal v0.4</p>
        <div id="loginBox" class="w-full max-w-xs space-y-4">
            <input id="nickInput" type="text" placeholder="닉네임 입력" class="w-full bg-slate-800 border-2 border-slate-700 p-4 rounded-xl text-center font-bold text-white outline-none focus:border-amber-500">
            <button onclick="joinLobby()" class="w-full bg-amber-600 py-4 rounded-xl font-black text-lg text-white">전장 진입</button>
        </div>
        <div id="waitingBox" class="w-full max-w-xs space-y-4 hidden">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div id="playerList" class="space-y-1 text-sm font-bold text-white text-center"></div>
            </div>
            <button id="readyBtn" onclick="toggleReady()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-lg text-white">READY</button>
            <p id="startMsg" class="text-xs text-rose-400 font-bold mt-4 text-center"></p>
        </div>
    </div>

    <div id="gameScreen" class="flex-1 flex flex-col hidden">
        <div class="grid grid-cols-4 gap-1 mb-2 bg-slate-800 p-2 rounded-xl border border-slate-700 shadow-lg">
            <div class="text-center border-r border-slate-700"><p class="text-[8px] text-slate-500 font-bold uppercase">HP</p><p id="hpDisp" class="text-sm font-black text-emerald-400">100</p></div>
            <div class="text-center border-r border-slate-700"><p class="text-[8px] text-slate-500 font-bold uppercase">Zone</p><p id="timerDisp" class="text-sm font-black text-rose-500">60s</p></div>
            <div class="text-center"><p class="text-[8px] text-slate-500 font-bold uppercase">Weapon</p><p id="wpDisp" class="text-[9px] font-bold truncate px-1">맨주먹</p></div>
            <div class="flex items-center justify-center"><button id="adminSkip" onclick="adminSkip()" class="hidden bg-rose-700 px-2 py-1 rounded text-[9px] font-black text-white">NEXT PHASE</button></div>
        </div>

        <div id="mapGrid" class="grid grid-cols-5 gap-1 mb-2"></div>
        <div id="logWindow" class="log-window flex-1 bg-black/40 rounded-xl border border-slate-800 p-3 overflow-y-auto text-[11px] mb-2 leading-relaxed shadow-inner"></div>

        <div class="grid grid-cols-3 gap-2 mb-1">
            <button onclick="farmItem()" class="bg-amber-600 py-4 rounded-xl font-black text-[10px] text-white">🔍 파밍</button>
            <button onclick="showMove()" class="bg-slate-700 py-4 rounded-xl font-black text-[10px] text-white">🏃 이동</button>
            <button onclick="showManual()" class="bg-indigo-600 py-4 rounded-xl font-black text-[10px] text-white">📖 도감</button>
        </div>
    </div>

    <div id="moveModal" class="modal hidden">
        <p class="text-center text-xs font-bold mb-4 text-slate-400 uppercase">Select Target Sector</p>
        <div id="moveGrid" class="grid grid-cols-5 gap-2 mb-6"></div>
        <button onclick="showMove()" class="w-full py-4 bg-slate-800 rounded-xl text-slate-400 font-bold text-sm">CANCEL</button>
    </div>

    <div id="manualModal" class="modal hidden">
        <h2 class="text-xl font-black text-indigo-400 mb-4 italic uppercase">Survivor Manual</h2>
        <div class="flex-1 overflow-y-auto space-y-4 text-[10px]">
            <div class="bg-slate-800 p-3 rounded-lg"><p class="font-bold text-indigo-300 mb-1 border-b border-indigo-900">[무기]</p>
                쇠파이프(15/10), 소방도끼(25/7), 리볼버(55/6), 크로스보우(45/3), <span class="text-amber-500 font-bold">???(??)</span></div>
            <div class="bg-slate-800 p-3 rounded-lg"><p class="font-bold text-emerald-300 mb-1 border-b border-emerald-900">[방어구]</p>
                경찰(20%/100), 군용(40%/150), 전술(60%/250), <span class="text-amber-500 font-bold">???(??)</span></div>
            <div class="bg-slate-800 p-3 rounded-lg"><p class="font-bold text-rose-300 mb-1 border-b border-rose-900">[소모품]</p>
                붕대(+15), 구급상자(HP 80고정), 드링크(회복+도주버프), <span class="text-amber-500 font-bold">???(??)</span></div>
        </div>
        <button onclick="showManual()" class="mt-4 py-4 bg-slate-800 rounded-xl font-bold">CLOSE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M",
            authDomain: "nextgenband.firebaseapp.com",
            databaseURL: "https://nextgenband-default-rtdb.firebaseio.com",
            projectId: "nextgenband",
            storageBucket: "nextgenband.firebasestorage.app",
            messagingSenderId: "251453757830",
            appId: "1:251453757830:web:201c7945ef0eba901db407"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myId, myName, isAdmin, isReady = false, myPos = { r: 2, c: 2 }, myHP = 100, myWeapon = "맨주먹", worldData = { state: 'waiting', timer: 60, closed: [] };

        window.joinLobby = () => {
            myName = document.getElementById('nickInput').value.trim();
            if(!myName) return;
            myId = "U_" + Math.random().toString(36).substring(2, 7);
            isAdmin = (myName === "admin");
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('waitingBox').classList.remove('hidden');
            if(isAdmin) document.getElementById('adminSkip').classList.remove('hidden');
            set(ref(db, `game/players/${myId}`), { id: myId, name: myName, ready: false, pos: myPos, hp: 100 });
            onDisconnect(ref(db, `game/players/${myId}`)).remove();
            syncLobby();
        };

        function syncLobby() {
            onValue(ref(db, 'game'), (snap) => {
                const data = snap.val() || {}; worldData = data.world || worldData;
                const players = data.players || {};
                document.getElementById('playerList').innerHTML = Object.values(players).map(p => `<div>${p.ready ? '✅' : '⏳'} ${p.name}</div>`).join('');
                const pArray = Object.values(players);
                if(pArray.length >= (isAdmin?1:2) && pArray.every(p => p.ready) && worldData.state === 'waiting') {
                    document.getElementById('startMsg').innerText = "Starting Game...";
                    if(isAdmin) setTimeout(startGame, 1500);
                }
                if(worldData.state === 'playing') {
                    document.getElementById('lobbyScreen').classList.add('hidden');
                    document.getElementById('gameScreen').classList.remove('hidden');
                    updateUI();
                }
            });
        }

        window.toggleReady = () => { isReady = !isReady; update(ref(db, `game/players/${myId}`), { ready: isReady }); };
        function startGame() { update(ref(db, 'game/world'), { state: 'playing', timer: 60, closed: [] }); if(isAdmin) startTimer(); }
        function startTimer() { setInterval(() => { if(!isAdmin || worldData.state !== 'playing') return; if(worldData.timer > 0) update(ref(db, 'game/world'), { timer: worldData.timer - 1 }); else closeSectors(); }, 1000); }
        window.adminSkip = () => { if(isAdmin) closeSectors(); };
        function closeSectors() {
            const all = []; for(let i=0; i<5; i++) for(let j=0; j<5; j++) all.push(String.fromCharCode(65+i)+(j+1));
            const avail = all.filter(s => !worldData.closed.includes(s));
            if(avail.length <= 1) return;
            const toClose = []; for(let i=0; i<2; i++) { const r = Math.floor(Math.random()*avail.length); toClose.push(avail.splice(r,1)[0]); }
            update(ref(db, 'game/world'), { closed: [...worldData.closed, ...toClose], timer: 60 });
        }

        function updateUI() {
            document.getElementById('timerDisp').innerText = worldData.timer + "s";
            document.getElementById('hpDisp').innerText = myHP;
            document.getElementById('wpDisp').innerText = myWeapon;
            const grid = document.getElementById('mapGrid'); const mGrid = document.getElementById('moveGrid');
            grid.innerHTML = ''; mGrid.innerHTML = '';
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const addr = String.fromCharCode(65+r)+(c+1); const isClosed = worldData.closed.includes(addr); const isMe = (myPos.r===r && myPos.c===c);
                    const d = document.createElement('div'); d.className = `sector bg-slate-700 text-slate-400 ${isClosed?'closed':''} ${isMe?'is-me':''}`;
                    d.innerText = addr; grid.appendChild(d);
                    const b = document.createElement('button'); b.className = `p-3 rounded-lg text-xs font-bold text-white ${isClosed?'bg-red-950 opacity-50':'bg-slate-700'}`;
                    b.innerText = addr; if(!isClosed) b.onclick = () => moveTo(r, c, addr);
                    mGrid.appendChild(b);
                }
            }
        }

        function moveTo(r, c, addr) {
            myPos = { r, c }; update(ref(db, `game/players/${myId}`), { pos: myPos });
            showMove(); addLog(`${addr} 구역으로 이동했습니다.`);
            triggerRandomEvent();
            updateUI();
        }

        function triggerRandomEvent() {
            const events = [
                { msg: "버려진 초코바를 발견해 허기를 채웁니다. (+5 HP)", hp: 5, clr: "text-emerald-400" },
                { msg: "깨진 유리 파편을 밟았습니다! (-10 HP)", hp: -10, clr: "text-rose-400" },
                { msg: "멀리서 총소리가 들려 긴장합니다. (아무 일 없음)", hp: 0, clr: "text-slate-500" },
                { msg: "발을 헛디뎌 넘어졌습니다. (-5 HP)", hp: -5, clr: "text-rose-300" },
                { msg: "누군가 남긴 깨끗한 물을 마십니다. (+10 HP)", hp: 10, clr: "text-emerald-500" }
            ];
            if (Math.random() < 0.4) { // 40% 확률로 이벤트 발생
                const e = events[Math.floor(Math.random() * events.length)];
                myHP = Math.max(0, Math.min(100, myHP + e.hp));
                addLog(`[이벤트] ${e.msg}`, e.clr);
                if(myHP <= 0) addLog("당신은 사망했습니다...", "text-red-600 font-bold");
            }
        }

        window.farmItem = () => {
            addLog("수색 중...", "text-amber-500");
            setTimeout(() => {
                const rand = Math.random();
                if(rand < 0.4) addLog("아무것도 찾지 못했습니다.");
                else if(rand < 0.7) { addLog("붕대 발견! (+15 HP)", "text-emerald-400"); myHP = Math.min(100, myHP + 15); }
                else { const ws = ["쇠파이프", "소방 도끼", "리볼버"]; myWeapon = ws[Math.floor(Math.random()*ws.length)]; addLog(`[${myWeapon}] 획득!`, "text-white font-bold"); }
                updateUI();
            }, 600);
        };

        function addLog(msg, clr="text-slate-400") { const l = document.getElementById('logWindow'); l.innerHTML += `<p class="${clr}">> ${msg}</p>`; l.scrollTop = l.scrollHeight; }
        window.showMove = () => document.getElementById('moveModal').classList.toggle('hidden');
        window.showManual = () => document.getElementById('manualModal').classList.toggle('hidden');
    </script>
</body>
</html>
