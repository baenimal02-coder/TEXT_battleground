<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KIMM BG v2.30</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; margin: 0; overflow: hidden; height: 100dvh; }
        .sector { border: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; border-radius: 4px; background: #0f172a; color: #475569; position: relative; }
        .closed { background-color: #450a0a !important; border-color: #ef4444 !important; color: #ef4444 !important; opacity: 0.8; }
        .is-me { border-color: #10b981 !important; color: #fff !important; background-color: #064e3b !important; z-index: 10; box-shadow: inset 0 0 10px #10b981; }
        .is-me::after { content: '●'; color: #ef4444; position: absolute; top: 1px; right: 3px; animation: blink 0.8s infinite; font-size: 14px; text-shadow: 0 0 5px #ef4444; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .log-window::-webkit-scrollbar { width: 4px; }
        .log-window::-webkit-scrollbar-thumb { background: #334155; }
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background-color: rgba(0,0,0,0.98); z-index: 1000; display: flex; flex-direction: column; padding: 1.5rem; }
    </style>
</head>
<body class="flex flex-col max-w-lg mx-auto">

    <div id="lobbyScreen" class="fixed inset-0 bg-slate-950 z-[2000] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-black text-amber-500 italic mb-1 tracking-tighter">KIMM BATTLEGROUNDS</h1>
        <p class="text-slate-600 font-bold text-[10px] mb-12 tracking-[0.4em] uppercase">Engine v2.30 Hard Wipe</p>
        <div id="loginBox" class="w-full max-w-xs space-y-4">
            <input id="nickInput" type="text" placeholder="NICKNAME" class="w-full bg-slate-900 border-2 border-slate-800 p-4 rounded-2xl text-center text-white outline-none focus:border-amber-500 transition-all">
            <button onclick="joinLobby()" class="w-full bg-amber-600 py-4 rounded-2xl font-black text-white text-lg shadow-2xl active:scale-95 transition-all">ENTER ARENA</button>
        </div>
        <div id="waitingBox" class="w-full max-w-xs space-y-4 hidden">
            <div id="playerList" class="bg-slate-900/80 p-4 rounded-2xl border border-slate-800 text-white font-bold space-y-2 mb-4"></div>
            <button id="readyBtn" onclick="toggleReady()" class="w-full bg-emerald-600 py-4 rounded-2xl font-black text-white text-lg shadow-lg">READY TO DROP</button>
        </div>
    </div>

    <div id="landingScreen" class="fixed inset-0 bg-slate-950 z-[1500] flex flex-col p-6 hidden text-white">
        <h2 class="text-2xl font-black text-amber-500 mb-2 italic text-center uppercase tracking-widest">Select Landing Zone</h2>
        <div class="flex-1 min-h-0 bg-black/40 p-2 rounded-2xl border border-slate-800">
            <div id="landingGrid" class="grid grid-cols-5 grid-rows-5 gap-1 h-full w-full"></div>
        </div>
    </div>

    <div id="victoryScreen" class="fixed inset-0 bg-black/95 z-[3000] flex flex-col items-center justify-center p-6 text-center hidden">
        <p class="text-amber-500 text-7xl mb-6">🏆</p>
        <h1 class="text-4xl font-black text-white mb-2 italic">WINNER WINNER!</h1>
        <div class="bg-amber-950/40 py-8 px-10 rounded-[3rem] border-2 border-amber-500/50 shadow-[0_0_50px_rgba(245,158,11,0.1)]">
            <p class="text-amber-400 text-2xl font-black leading-tight">당신은 승리해서<br>원장이 되었습니다</p>
        </div>
        <button onclick="location.reload()" class="mt-16 text-slate-600 font-bold uppercase underline">Return to Lobby</button>
    </div>

    <div id="gameScreen" class="flex flex-col h-screen hidden p-2">
        <div class="flex-none mb-2">
            <div class="grid grid-cols-4 gap-1 bg-slate-900 p-3 rounded-2xl border border-slate-800 shadow-xl text-white">
                <div class="text-center border-r border-slate-800"><p class="text-[7px] text-slate-500 font-bold uppercase">Health</p><p id="hpDisp" class="text-sm font-black text-emerald-400">100</p></div>
                <div class="text-center border-r border-slate-800"><p class="text-[7px] text-slate-500 font-bold uppercase">Zone</p><p id="timerDisp" class="text-sm font-black text-rose-500">60s</p></div>
                <div class="text-center border-r border-slate-800"><p class="text-[7px] text-slate-500 font-bold uppercase">Equip</p><p id="wpDisp" class="text-[9px] font-bold text-amber-300 truncate px-1">맨주먹</p></div>
                <div class="text-center"><p class="text-[7px] text-slate-500 font-bold uppercase">Live</p><p id="survDisp" class="text-sm font-black text-blue-400">0</p></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-h-0">
            <div class="basis-[42%] p-1 bg-black/20 rounded-2xl border border-slate-900 shadow-inner overflow-hidden mb-2">
                <div id="mapGrid" class="grid grid-cols-5 grid-rows-5 gap-1 h-full w-full"></div>
            </div>
            <div id="logWindow" class="basis-[58%] bg-black/60 rounded-2xl border border-slate-900 p-4 overflow-y-auto text-[11px] leading-relaxed shadow-inner scroll-smooth">
                <p id="deathNotice" class="text-rose-500 font-bold hidden text-center mb-2 animate-pulse">SQUAD ELIMINATED. SPECTATING...</p>
            </div>
        </div>

        <div id="actionPanel" class="flex-none pb-[env(safe-area-inset-bottom)] mt-2">
            <button id="adminSkip" onclick="adminSkip()" class="hidden bg-rose-800 w-full py-2 rounded-xl text-[10px] font-black text-white mb-2 uppercase tracking-widest border border-rose-600">Admin: Force Next Zone</button>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="farmItem()" id="farmBtn" class="bg-amber-600 py-5 rounded-2xl font-black text-xs text-white shadow-xl active:bg-amber-500 transition-all">🔍 파밍(0/2)</button>
                <button onclick="showMove()" id="moveBtn" class="bg-slate-800 py-5 rounded-2xl font-black text-xs text-white shadow-xl active:bg-slate-700 transition-all">🏃 이동</button>
                <button onclick="showManual()" class="bg-indigo-900 py-5 rounded-2xl font-black text-xs text-white shadow-xl">📖 도감</button>
            </div>
        </div>
    </div>

    <div id="moveModal" class="modal hidden">
        <h2 class="text-center text-white font-black mb-6 uppercase italic border-b border-slate-800 pb-2 tracking-widest">Select Target</h2>
        <div id="moveGrid" class="grid grid-cols-5 grid-rows-5 gap-1 h-[60%] w-full"></div>
        <button onclick="showMove()" class="mt-auto py-5 bg-slate-900 rounded-2xl text-slate-500 font-bold uppercase tracking-widest border border-slate-800">Close</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M", authDomain: "nextgenband.firebaseapp.com", databaseURL: "https://nextgenband-default-rtdb.firebaseio.com", projectId: "nextgenband", storageBucket: "nextgenband.firebasestorage.app", messagingSenderId: "251453757830", appId: "1:251453757830:web:201c7945ef0eba901db407" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, isAdmin, isReady = false, myPos = null, myHP = 100, myWeapon = "맨주먹", farmCount = 0;
        let worldData = { state: 'waiting', timer: 60, closed_zones: {} };
        let isDead = false, isWon = false, redZoneTimer = null, redZoneCount = 30, lastEventId = null, localSec = 0;

        window.joinLobby = () => {
            myName = document.getElementById('nickInput').value.trim(); if(!myName) return;
            myId = "U_" + Math.random().toString(36).substring(2, 7); isAdmin = (myName === "admin");
            document.getElementById('loginBox').classList.add('hidden'); document.getElementById('waitingBox').classList.remove('hidden');
            if(isAdmin) document.getElementById('adminSkip').classList.remove('hidden');
            set(ref(db, `game/players/${myId}`), { id: myId, name: myName, ready: false, hp: 100, status: 'alive' });
            onDisconnect(ref(db, `game/players/${myId}`)).remove(); syncLobby();
        };

        function syncLobby() {
            onValue(ref(db, 'game'), (snap) => {
                const data = snap.val() || {}; 
                worldData = data.world || { state: 'waiting', timer: 60, closed_zones: {} };
                const players = data.players || {};
                const pArray = Object.values(players);
                const aliveList = pArray.filter(p => p.status === 'alive');
                
                document.getElementById('playerList').innerHTML = pArray.map(p => `<div class="flex justify-between text-[11px] uppercase"><span>${p.name}</span><span class="${p.ready?'text-emerald-400':'text-slate-600'}">${p.ready?'[READY]':'[WAIT]'}</span></div>`).join('');
                document.getElementById('survDisp').innerText = aliveList.length;

                if(players[myId]) myHP = players[myId].hp;

                if(worldData.state === 'playing') {
                    document.getElementById('lobbyScreen').classList.add('hidden');
                    if(!myPos) { document.getElementById('landingScreen').classList.remove('hidden'); renderLandingGrid(); }
                    else { 
                        document.getElementById('landingScreen').classList.add('hidden'); 
                        document.getElementById('gameScreen').classList.remove('hidden'); 
                        updateUI(); 
                    }
                }

                if(data.world && data.world.lastEvent && data.world.lastEvent.id !== lastEventId) {
                    const ev = data.world.lastEvent; lastEventId = ev.id;
                    addLog(`[월드] ${ev.msg}`, ev.type === 'death' ? 'text-rose-500 font-bold' : 'text-amber-400 font-black');
                }

                // 승리 판정 보강
                if(worldData.state === 'playing' && !isDead && myPos && aliveList.length === 1 && aliveList[0].id === myId && localSec > 15) {
                    if(pArray.some(p => p.status === 'dead') || (worldData.closed_zones && Object.keys(worldData.closed_zones).length > 15)) {
                        if(!isWon) { isWon = true; document.getElementById('victoryScreen').classList.remove('hidden'); }
                    }
                }
            });
        }

        window.toggleReady = () => {
            if(isAdmin) {
                remove(ref(db, 'game')).then(() => {
                    setTimeout(() => {
                        set(ref(db, `game/players/${myId}`), { id: myId, name: myName, ready: true, hp: 100, status: 'alive' });
                        set(ref(db, 'game/world'), { state: 'playing', timer: 60, closed_zones: {init: true}, lastEvent: {id: Date.now(), msg: '새로운 전투 시작!'} });
                    }, 700);
                });
            } else { isReady=!isReady; update(ref(db, `game/players/${myId}`), {ready: isReady}); }
        };

        window.adminSkip = () => { if(isAdmin) closeSectors(); };

        function closeSectors() {
            const all = []; for(let i=0; i<5; i++) for(let j=0; j<5; j++) all.push(String.fromCharCode(65+i)+(j+1));
            const currentClosed = worldData.closed_zones || {};
            const avail = all.filter(s => !currentClosed[s]);
            if(avail.length <= 1) return;
            const toClose = []; for(let i=0; i<2; i++) { if(avail.length>0) toClose.push(avail.splice(Math.floor(Math.random()*avail.length), 1)[0]); }
            const updates = {}; toClose.forEach(z => updates[z] = true);
            update(ref(db, 'game/world/closed_zones'), updates);
            update(ref(db, 'game/world'), { timer: 60, lastEvent: {id: Date.now(), msg: '자기장 수축!'} });
        }

        function updateUI() {
            document.getElementById('hpDisp').innerText = isDead ? "0" : myHP;
            document.getElementById('timerDisp').innerText = (worldData.timer || 0) + "s";
            document.getElementById('wpDisp').innerText = myWeapon;
            document.getElementById('farmBtn').innerText = `🔍 파밍(${farmCount}/2)`;

            const grid = document.getElementById('mapGrid'); grid.innerHTML = '';
            const mGrid = document.getElementById('moveGrid'); mGrid.innerHTML = '';
            const cz = worldData.closed_zones || {};

            for(let r=0; r<5; r++) { for(let c=0; c<5; c++) {
                const row = String.fromCharCode(65+r); const col = (c+1); const addr = `${row}-${col}`; const addrKey = `${row}${col}`;
                const isMe = (myPos && myPos.r===r && myPos.c===c);
                const isClosed = cz[addrKey];
                
                const d = document.createElement('div'); d.className = `sector ${isClosed?'closed':''} ${isMe?'is-me':''}`;
                d.innerText = addr; grid.appendChild(d);

                const b = document.createElement('button'); b.className = `sector ${isClosed?'closed opacity-20':'hover:bg-emerald-800'}`;
                b.innerText = addr; if(!isClosed && !isDead) b.onclick = () => moveTo(r, c, addrKey, addr);
                mGrid.appendChild(b);
            } }
            checkRedZoneStatus(cz);
        }

        window.moveTo = (r, c, ak, a) => {
            if(isDead) return; myPos = { r, c }; farmCount = 0;
            update(ref(db, `game/players/${myId}`), { pos: myPos });
            document.getElementById('moveModal').classList.add('hidden');
            addLog(`--- ${a} 진입 ---`, "text-white font-bold py-1 border-y border-slate-800 my-2");
            if (Math.random() < 0.2) { 
                const evs = [{m:"파편에 베였습니다. (-10 HP)", h:-10}, {m:"넘어짐 (-5 HP)", h:-5}, {m:"음료 발견! (+10 HP)", h:10}];
                const e = evs[Math.floor(Math.random()*evs.length)];
                const nextHP = Math.max(0, Math.min(100, myHP + e.h));
                update(ref(db, `game/players/${myId}`), { hp: nextHP });
                addLog(`[이벤트] ${e.m}`, "text-rose-400");
                if (nextHP <= 0) playerDeath();
            }
            updateUI();
        };

        window.farmItem = () => {
            if(isDead || farmCount >= 2) return; farmCount++; updateUI(); addLog(`수색 중... (${farmCount}/2)`, "text-amber-500 animate-pulse");
            setTimeout(() => {
                const rand = Math.random();
                if(rand < 0.4) addLog("아무것도 찾지 못했습니다.");
                else if(rand < 0.7) { 
                    addLog("붕대 발견! (+15 HP)", "text-emerald-400 font-bold"); 
                    update(ref(db, `game/players/${myId}`), { hp: Math.min(100, myHP + 15) });
                } else {
                    const ws = ["리볼버", "소방 도끼", "경찰 조끼", "크로스보우"]; const res = ws[Math.floor(Math.random()*ws.length)];
                    myWeapon = res; addLog(`[${res}] 장착.`, "text-sky-400 font-black");
                }
                updateUI();
            }, 600);
        };

        function playerDeath() {
            isDead = true; clearInterval(redZoneTimer);
            update(ref(db, `game/players/${myId}`), { hp: 0, status: 'dead' });
            update(ref(db, 'game/world/lastEvent'), { id: Date.now(), type: 'death', msg: `${myName} 소멸.` });
            document.getElementById('deathNotice').classList.remove('hidden');
            document.getElementById('farmBtn').disabled = true; updateUI();
        }

        function checkRedZoneStatus(cz) {
            if(!myPos || isDead || isAdmin) return;
            const myAK = `${String.fromCharCode(65+myPos.r)}${myPos.c+1}`;
            if (cz[myAK] && !redZoneTimer) {
                addLog("[경고] 레드존! 30초 내 탈출하세요.", "text-rose-500 font-bold underline");
                redZoneCount = 30;
                redZoneTimer = setInterval(() => {
                    redZoneCount--;
                    if ([20, 10, 5, 4, 3, 2, 1].includes(redZoneCount)) addLog(`[위험] ${redZoneCount}초 후 사망!`, "text-rose-400 font-bold");
                    if (redZoneCount <= 0) playerDeath();
                }, 1000);
            } else if (!cz[myAK] && redZoneTimer) {
                addLog("[안전] 탈출 성공.", "text-emerald-400");
                clearInterval(redZoneTimer); redZoneTimer = null;
            }
        }

        function renderLandingGrid() {
            const grid = document.getElementById('landingGrid'); grid.innerHTML = '';
            for(let r=0; r<5; r++) { for(let c=0; c<5; c++) {
                const addr = `${String.fromCharCode(65+r)}-${c+1}`;
                const b = document.createElement('button'); b.className = "sector bg-slate-900 text-slate-500 hover:bg-emerald-900";
                b.innerText = addr; b.onclick = () => { myPos = { r, c }; update(ref(db, `game/players/${myId}`), { pos: myPos }); };
                grid.appendChild(b);
            } }
        }

        function addLog(msg, clr="text-slate-400") { const l = document.getElementById('logWindow'); l.innerHTML += `<p class="${clr} mb-1">> ${msg}</p>`; l.scrollTop = l.scrollHeight; }
        window.showMove = () => { if(!isDead) document.getElementById('moveModal').classList.toggle('hidden'); };
        window.showManual = () => {};

        setInterval(() => {
            if(worldData.state === 'playing') {
                localSec++;
                if(isAdmin) {
                    const cur = worldData.timer || 60;
                    if(cur > 0) update(ref(db, 'game/world'), {timer: cur - 1}); else closeSectors();
                }
            }
        }, 1000);
    </script>
</body>
</html>
