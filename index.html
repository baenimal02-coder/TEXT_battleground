<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기계연 배틀그라운드 v0.05 Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; margin: 0; overflow: hidden; height: 100dvh; }
        .grid-map { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); gap: 4px; height: 100%; width: 100%; }
        .sector { border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border-radius: 4px; background: #1e293b; color: #64748b; }
        .closed { background-color: #450a0a !important; border-color: #ef4444 !important; color: #ef4444 !important; }
        .is-me { border-color: #ef4444 !important; color: #fff !important; background-color: #064e3b !important; position: relative; }
        .is-me::after { content: '●'; color: #ef4444; position: absolute; top: 1px; right: 2px; animation: blink 0.8s infinite; font-size: 12px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .log-window::-webkit-scrollbar { width: 4px; }
        .log-window::-webkit-scrollbar-thumb { background: #334155; }
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background-color: rgba(0,0,0,0.98); z-index: 1000; display: flex; flex-direction: column; padding: 1.5rem; }
    </style>
</head>
<body class="flex flex-col max-w-lg mx-auto">

    <div id="lobbyScreen" class="fixed inset-0 bg-slate-900 z-[2000] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-3xl font-black text-amber-500 italic mb-2 uppercase tracking-widest">기계연 배틀그라운드</h1>
        <p class="text-rose-500 font-bold text-[10px] mb-10 tracking-[0.3em] uppercase">Build v0.05 Beta (Spectator Update)</p>
        <div id="loginBox" class="w-full max-w-xs space-y-4">
            <input id="nickInput" type="text" placeholder="닉네임 입력" class="w-full bg-slate-800 border-2 border-slate-700 p-4 rounded-xl text-center text-white outline-none">
            <button onclick="joinLobby()" class="w-full bg-amber-600 py-4 rounded-xl font-black text-white text-lg">전장 진입</button>
        </div>
        <div id="waitingBox" class="w-full max-w-xs space-y-4 hidden">
            <div id="playerList" class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-white font-bold space-y-1 mb-4 text-center"></div>
            <button id="readyBtn" onclick="toggleReady()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-white text-lg">READY</button>
            <p id="startMsg" class="text-xs text-rose-400 font-bold mt-4"></p>
        </div>
    </div>

    <div id="landingScreen" class="fixed inset-0 bg-slate-900 z-[1500] flex flex-col p-6 hidden">
        <h2 class="text-2xl font-black text-amber-500 mb-2 italic text-center uppercase">Landing</h2>
        <div class="flex-1 min-h-0 bg-slate-950 p-2 rounded-xl border border-slate-800">
            <div id="landingGrid" class="grid-map"></div>
        </div>
    </div>

    <div id="gameScreen" class="flex flex-col h-full hidden p-2">
        <div class="flex-none mb-2">
            <h1 class="text-center text-amber-500 font-black text-sm italic mb-1 uppercase tracking-tighter">기계연 배틀그라운드</h1>
            <div class="grid grid-cols-4 gap-1 bg-slate-800 p-2 rounded-xl border border-slate-700 shadow-lg">
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold uppercase">HP</p><p id="hpDisp" class="text-xs font-black text-emerald-400">100</p></div>
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold uppercase">ZONE</p><p id="timerDisp" class="text-xs font-black text-rose-500">60s</p></div>
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold uppercase">WP</p><p id="wpDisp" class="text-[9px] font-bold text-amber-300 truncate px-1">맨주먹</p></div>
                <div class="text-center"><p class="text-[7px] text-slate-500 font-bold uppercase">AR</p><p id="arDisp" class="text-[9px] font-bold text-blue-300 truncate px-1">없음</p></div>
            </div>
        </div>

        <div class="flex-none h-[40%] p-1 bg-slate-900 rounded-xl border border-slate-800 shadow-inner overflow-hidden mb-2">
            <div id="mapGrid" class="grid-map"></div>
        </div>

        <div id="logWindow" class="flex-1 bg-black/60 rounded-xl border border-slate-800 p-3 overflow-y-auto text-[11px] leading-tight shadow-inner mb-2">
            <p id="deathNotice" class="text-rose-500 font-bold hidden text-center mb-2 animate-pulse underline">당신은 사망했습니다. 이제 전장을 관전합니다.</p>
        </div>

        <div id="actionPanel" class="flex-none">
            <div class="grid grid-cols-3 gap-2 mb-1">
                <button onclick="farmItem()" id="farmBtn" class="bg-amber-600 py-4 rounded-xl font-black text-xs text-white shadow-lg active:bg-amber-500">🔍파밍(0/2)</button>
                <button onclick="showMove()" id="moveBtn" class="bg-slate-700 py-4 rounded-xl font-black text-xs text-white active:bg-slate-600 shadow-lg">🏃이동</button>
                <button onclick="showManual()" class="bg-indigo-600 py-4 rounded-xl font-black text-xs text-white shadow-lg">📖도감</button>
            </div>
            <button id="adminSkip" onclick="adminSkip()" class="hidden bg-rose-900 w-full py-2 rounded text-[9px] font-black text-white mb-1 uppercase tracking-widest shadow-xl">Admin: Next Phase</button>
        </div>
    </div>

    <div id="moveModal" class="modal hidden"><div id="moveGrid" class="grid-map h-1/2"></div><button onclick="showMove()" class="mt-auto py-4 bg-slate-800 rounded-xl text-slate-400 font-bold">CLOSE</button></div>
    <div id="manualModal" class="modal hidden"><div id="manualContent" class="flex-1 overflow-y-auto space-y-4 text-xs pr-2"></div><button onclick="showManual()" class="mt-4 py-4 bg-slate-800 rounded-xl font-bold">CLOSE</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M", authDomain: "nextgenband.firebaseapp.app", databaseURL: "https://nextgenband-default-rtdb.firebaseio.com", projectId: "nextgenband", storageBucket: "nextgenband.firebasestorage.app", messagingSenderId: "251453757830", appId: "1:251453757830:web:201c7945ef0eba901db407" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, isAdmin, isReady = false, myPos = null, myHP = 100, myWeapon = "맨주먹", myArmor = "없음", farmCount = 0;
        let worldData = { state: 'waiting', timer: 60, closed: [] };
        let isDead = false;
        let redZoneWarningTimer = null;
        let redZoneCounter = 30;

        window.joinLobby = () => {
            myName = document.getElementById('nickInput').value.trim(); if(!myName) return;
            myId = "U_" + Math.random().toString(36).substring(2, 7); isAdmin = (myName === "admin");
            document.getElementById('loginBox').classList.add('hidden'); document.getElementById('waitingBox').classList.remove('hidden');
            if(isAdmin) document.getElementById('adminSkip').classList.remove('hidden');
            set(ref(db, `game/players/${myId}`), { id: myId, name: myName, ready: false, hp: 100 });
            onDisconnect(ref(db, `game/players/${myId}`)).remove(); syncLobby();
        };

        function syncLobby() {
            onValue(ref(db, 'game'), (snap) => {
                const data = snap.val() || {}; worldData = data.world || { state: 'waiting', timer: 60, closed: [] };
                const players = data.players || {};
                document.getElementById('playerList').innerHTML = Object.values(players).map(p => `<div>${p.ready?'✅':'⏳'} ${p.name}</div>`).join('');
                if(Object.values(players).length >= (isAdmin?1:2) && Object.values(players).every(p=>p.ready) && worldData.state==='waiting') {
                    if(isAdmin) setTimeout(()=>update(ref(db, 'game/world'), {state:'playing', timer:60, closed:[]}), 1000);
                }
                if(worldData.state === 'playing') {
                    document.getElementById('lobbyScreen').classList.add('hidden');
                    if(!myPos) { document.getElementById('landingScreen').classList.remove('hidden'); renderLandingGrid(); }
                    else { document.getElementById('landingScreen').classList.add('hidden'); document.getElementById('gameScreen').classList.remove('hidden'); updateUI(); }
                }
            });
        }

        function updateUI() {
            document.getElementById('hpDisp').innerText = isDead ? "0" : myHP;
            document.getElementById('timerDisp').innerText = (worldData.timer || 0) + "s";
            document.getElementById('wpDisp').innerText = myWeapon;
            document.getElementById('arDisp').innerText = myArmor;
            document.getElementById('farmBtn').innerText = `🔍파밍(${farmCount}/2)`;

            const grid = document.getElementById('mapGrid'); grid.innerHTML = '';
            const mGrid = document.getElementById('moveGrid'); mGrid.innerHTML = '';
            const closedArr = worldData.closed || [];

            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const row = String.fromCharCode(65+r); const addr = `${row}-${c+1}`; const addrKey = `${row}${c+1}`;
                    const isMe = (myPos && myPos.r===r && myPos.c===c);
                    const isClosed = closedArr.includes(addrKey);
                    const d = document.createElement('div'); d.className = `sector ${isClosed?'closed':''} ${isMe?'is-me':''}`;
                    d.innerText = addr; grid.appendChild(d);
                    const b = document.createElement('button'); b.className = `sector ${isClosed?'closed opacity-20':'hover:bg-emerald-800'}`;
                    b.innerText = addr; if(!isClosed && !isDead) b.onclick = () => moveTo(r, c, addrKey, addr);
                    mGrid.appendChild(b);
                }
            }
            checkRedZoneStatus(closedArr);
        }

        function checkRedZoneStatus(closed) {
            if(!myPos || isDead) return;
            const myAddrKey = `${String.fromCharCode(65+myPos.r)}${myPos.c+1}`;
            const inRedZone = closed.includes(myAddrKey);

            if (inRedZone && !redZoneWarningTimer) {
                addLog("[위험] 현재 구역이 폐쇄되었습니다! 30초 내로 탈출하십시오.", "text-rose-500 font-bold underline");
                redZoneCounter = 30;
                redZoneWarningTimer = setInterval(() => {
                    redZoneCounter--;
                    const notify = [20, 10, 5, 4, 3, 2, 1];
                    if (notify.includes(redZoneCounter)) {
                        addLog(`[경고] ${redZoneCounter}초 후 구역이 소멸합니다!`, redZoneCounter <= 5 ? "text-rose-600 font-black animate-pulse" : "text-rose-400");
                    }
                    if (redZoneCounter <= 0) {
                        playerDeath();
                    }
                }, 1000);
            } else if (!inRedZone && redZoneWarningTimer) {
                addLog("[안전] 안전 구역으로 진입했습니다. 카운트다운 중지.", "text-emerald-400");
                clearInterval(redZoneWarningTimer);
                redZoneWarningTimer = null;
            }
        }

        function playerDeath() {
            isDead = true;
            myHP = 0;
            clearInterval(redZoneWarningTimer);
            addLog("탈출 실패... 당신은 구역 소멸과 함께 전사했습니다.", "text-red-600 font-black text-lg");
            document.getElementById('deathNotice').classList.remove('hidden');
            document.getElementById('farmBtn').disabled = true;
            document.getElementById('moveBtn').disabled = true;
            document.getElementById('farmBtn').classList.add('opacity-30');
            document.getElementById('moveBtn').classList.add('opacity-30');
            updateUI();
        }

        window.moveTo = (r, c, addrKey, addr) => {
            if(isDead) return;
            myPos = { r, c }; farmCount = 0;
            update(ref(db, `game/players/${myId}`), { pos: myPos });
            document.getElementById('moveModal').classList.add('hidden');
            addLog(`--- ${addr} 이동 완료 ---`, "text-white font-bold py-1 my-1 border-y border-slate-800");
            updateUI();
        };

        // 기타 파밍/로비/낙하 로직 유지...
        window.renderLandingGrid = () => { /* 이전 버전과 동일 */ };
        window.farmItem = () => { /* 이전 버전과 동일 */ };
        window.addLog = (msg, clr="text-slate-400") => { /* 이전 버전과 동일 */ };
        window.showMove = () => document.getElementById('moveModal').classList.toggle('hidden');
        window.showManual = () => document.getElementById('manualModal').classList.toggle('hidden');

        setInterval(() => { if(isAdmin && worldData.state === 'playing') { const cur = worldData.timer || 60; if(cur > 0) update(ref(db, 'game/world'), {timer: cur - 1}); else closeSectors(); }}, 1000);
    </script>
</body>
</html>
