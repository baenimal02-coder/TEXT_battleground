import os

# HTML/JS/CSS 통합 소스코드
html_content = """
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Talk v0.02</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #ecf0f1; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { background: white; width: 450px; height: 85vh; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; }
        
        /* Lobby */
        #lobby { padding: 40px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; box-sizing: border-box; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        select { padding: 15px; margin: 25px 0; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; width: 100%; outline: none; }
        .btn-entry { padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; }

        /* Chat Room */
        #chat-room { display: none; flex-direction: column; height: 100%; }
        header { padding: 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; background: #f7f9fa; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { max-width: 85%; position: relative; }
        .msg.mine { align-self: flex-end; }
        .msg.other { align-self: flex-start; }
        .msg.sys { align-self: center; background: #d1d8e0; color: #4b6584; font-size: 12px; padding: 5px 15px; border-radius: 20px; }
        
        .sender { font-size: 12px; color: #7f8c8d; margin-bottom: 4px; display: block; }
        .bubble { padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .mine .bubble { background: #3498db; color: white; border-bottom-right-radius: 2px; }
        .other .bubble { background: white; color: #333; border-bottom-left-radius: 2px; border: 1px solid #eee; }

        .input-area { padding: 15px; display: flex; background: white; border-top: 1px solid #eee; }
        #chat-input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 15px; }
        #send-btn { margin-left: 10px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="lobby">
        <div class="logo">OFFICE TALK</div>
        <p>캐릭터별 고유 말투가 적용됩니다.</p>
        <select id="char-select">
            <option value="김정한">김정한 (팀장)</option>
            <option value="조현우">조현우 (대리)</option>
            <option value="이정우">이정우 (과장)</option>
            <option value="박희성">박희성 (사원)</option>
            <option value="임재남">임재남 (부장)</option>
            <option value="배상호">배상호 (인턴)</option>
        </select>
        <button id="entry-btn" class="btn-entry">채팅방 입장</button>
    </div>

    <div id="chat-room">
        <header><span id="user-display"></span> <small>v0.02 Alpha</small></header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." autocomplete="off">
            <button id="send-btn">▲</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M", 
        authDomain: "nextgenband.firebaseapp.com", 
        databaseURL: "https://nextgenband-default-rtdb.firebaseio.com", 
        projectId: "nextgenband", 
        storageBucket: "nextgenband.firebasestorage.app", 
        messagingSenderId: "251453757830", 
        appId: "1:251453757830:web:201c7945ef0eba901db407" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = "";
    
    // 말투 설정 데이터
    const speechPatterns = {
        "김정한": { pre: "[확인] ", post: " (공유 바랍니다)" },
        "조현우": { pre: "", post: " 아 시발 퇴사하고싶다" },
        "이정우": { pre: "(한숨) ", post: "...피곤하네요" },
        "박희성": { pre: "🔥 ", post: "!! 가즈아아!!" },
        "임재남": { pre: "라떼는 말이야, ", post: " 허허..." },
        "배상호": { pre: "저기... ", post: " (죄송합니다)" }
    };

    const lobby = document.getElementById('lobby');
    const chatRoom = document.getElementById('chat-room');
    const chatBox = document.getElementById('chat-box');

    document.getElementById('entry-btn').onclick = () => {
        myName = document.getElementById('char-select').value;
        lobby.style.display = 'none';
        chatRoom.style.display = 'flex';
        document.getElementById('user-display').innerText = myName;
        push(ref(db, 'chat'), { sender: "SYS", message: `${myName}님이 로그인했습니다.`, type: "sys" });
    };

    // 메시지 변조 함수
    const applySpeechPattern = (text, name) => {
        const pattern = speechPatterns[name];
        if(!pattern) return text;

        const rand = Math.random();
        // 33% 확률로 앞뒤 다 붙임, 33% 확률로 앞만, 34% 확률로 뒤만
        if(rand < 0.33) return pattern.pre + text + pattern.post;
        else if(rand < 0.66) return pattern.pre + text;
        else return text + pattern.post;
    };

    const sendMessage = () => {
        const input = document.getElementById('chat-input');
        const rawText = input.value.trim();
        if(!rawText) return;

        const convertedText = applySpeechPattern(rawText, myName);
        push(ref(db, 'chat'), {
            sender: myName,
            message: convertedText,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    onValue(ref(db, 'chat'), (snap) => {
        chatBox.innerHTML = "";
        const data = snap.val();
        if(!data) return;
        
        Object.values(data).forEach(msg => {
            const msgDiv = document.createElement('div');
            if(msg.type === 'sys') {
                msgDiv.className = 'msg sys';
                msgDiv.innerText = msg.message;
            } else {
                const isMine = msg.sender === myName;
                msgDiv.className = `msg ${isMine ? 'mine' : 'other'}`;
                msgDiv.innerHTML = `
                    ${!isMine ? `<span class="sender">${msg.sender}</span>` : ''}
                    <div class="bubble">${msg.message}</div>
                `;
            }
            chatBox.appendChild(msgDiv);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>
</body>
</html>
