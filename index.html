<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Tile War v0.05</title>
    <style>
        :root { --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        /* Lobby */
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .char-card { padding: 10px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .char-card.selected { border-color: #3498db; background: #ebf5ff; }

        /* Game Board */
        #game-screen { display: none; }
        .scoreboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        .score-item { padding: 5px 10px; border-radius: 15px; color: white; }
        
        .grid { display: grid; grid-template-columns: repeat(10, 35px); grid-template-rows: repeat(10, 35px); gap: 4px; border: 4px solid #333; padding: 4px; background: #333; border-radius: 8px; }
        .tile { background: white; border-radius: 4px; cursor: pointer; transition: background 0.1s; }
        .tile:hover { filter: brightness(0.9); }
    </style>
</head>
<body>

<div id="app">
    <!-- 1. 캐릭터 선택 로비 -->
    <div id="lobby">
        <h2>타일 점령전</h2>
        <p>캐릭터를 선택하고 땅을 넓히세요!</p>
        <div class="char-grid" id="char-list"></div>
        <button id="start-btn" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">게임 입장</button>
    </div>

    <!-- 2. 게임 화면 -->
    <div id="game-screen">
        <div class="scoreboard" id="scoreboard"></div>
        <div class="grid" id="tile-grid"></div>
        <p style="margin-top:15px; color:#666; font-size:12px;">타일을 클릭하여 자신의 색으로 점령하세요!</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M", 
        authDomain: "nextgenband.firebaseapp.com", 
        databaseURL: "https://nextgenband-default-rtdb.firebaseio.com", 
        projectId: "nextgenband", 
        storageBucket: "nextgenband.firebasestorage.app", 
        messagingSenderId: "251453757830", 
        appId: "1:251453757830:web:201c7945ef0eba901db407" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const chars = [
        { name: "김정한", color: "#e74c3c" }, { name: "조현우", color: "#3498db" },
        { name: "이정우", color: "#f1c40f" }, { name: "박희성", color: "#2ecc71" },
        { name: "임재남", color: "#9b59b6" }, { name: "배상호", color: "#34495e" }
    ];

    let myChar = null;

    // 로비 구성
    const charListDiv = document.getElementById('char-list');
    chars.forEach(c => {
        const card = document.createElement('div');
        card.className = 'char-card';
        card.innerHTML = `<div style="width:30px; height:30px; background:${c.color}; margin:0 auto 5px; border-radius:50%;"></div>${c.name}`;
        card.onclick = () => {
            document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
            card.classList.add('selected');
            myChar = c;
        };
        charListDiv.appendChild(card);
    });

    // 게임 시작
    document.getElementById('start-btn').onclick = () => {
        if(!myChar) return alert("캐릭터를 선택해주세요!");
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        initGrid();
    };

    // 그리드 생성 및 클릭 이벤트
    function initGrid() {
        const gridDiv = document.getElementById('tile-grid');
        for(let i=0; i<100; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}`;
            tile.onclick = () => {
                set(ref(db, `tiles/${i}`), { owner: myChar.name, color: myChar.color });
            };
            gridDiv.appendChild(tile);
        }
    }

    // 실시간 동기화 (타일 및 점수)
    onValue(ref(db, 'tiles'), (snap) => {
        const data = snap.val() || {};
        const scores = {};
        chars.forEach(c => scores[c.name] = 0);

        for(let i=0; i<100; i++) {
            const tileEl = document.getElementById(`tile-${i}`);
            if(data[i]) {
                tileEl.style.background = data[i].color;
                scores[data[i].owner]++;
            }
        }

        // 스코어보드 업데이트
        const scoreDiv = document.getElementById('scoreboard');
        scoreDiv.innerHTML = "";
        chars.forEach(c => {
            const item = document.createElement('div');
            item.className = 'score-item';
            item.style.background = c.color;
            item.innerText = `${c.name}: ${scores[c.name]}`;
            scoreDiv.appendChild(item);
        });
    });
</script>
</body>
</html>
