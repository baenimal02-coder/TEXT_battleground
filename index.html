# ds_python_interpreter를 사용하여 파일 생성
import os

html_content = """
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Survival v0.01</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { background: white; width: 400px; height: 600px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        
        /* Lobby */
        #lobby { padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        select { padding: 10px; margin: 20px 0; border-radius: 5px; border: 1px solid #ddd; font-size: 16px; }
        button { padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }

        /* Game Room */
        #game-room { display: none; flex-direction: column; height: 100%; }
        header { padding: 15px; background: var(--primary-color); color: white; text-align: center; }
        
        #game-status { background: #fff3f3; padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        #bomb-holder { font-weight: bold; color: var(--danger-color); font-size: 1.2em; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; background: white; border: 1px solid #eee; width: fit-content; max-width: 80%; }
        .message.mine { background: #dcf8c6; margin-left: auto; border: none; }
        .msg-sender { font-size: 0.8em; color: #888; margin-bottom: 3px; }

        .input-area { padding: 15px; display: flex; border-top: 1px solid #eee; }
        #chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="app">
    <div id="lobby">
        <h2>Office Survival</h2>
        <p>등장인물을 선택하세요</p>
        <select id="char-select">
            <option value="김정한">김정한</option>
            <option value="조현우">조현우</option>
            <option value="이정우">이정우</option>
            <option value="박희성">박희성</option>
            <option value="임재남">임재남</option>
            <option value="배상호">배상호</option>
        </select>
        <button id="entry-btn">게임 시작</button>
    </div>

    <div id="game-room">
        <header><span id="user-info"></span></header>
        
        <div id="game-status">
            <div>💣 현재 폭탄 보유자</div>
            <div id="bomb-holder">대기 중...</div>
            <button id="pass-btn" style="margin-top:10px; background:var(--danger-color);">폭탄 넘기기!</button>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="chat-input" placeholder="메시지를 입력하세요...">
            <button id="send-btn">전송</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M", 
        authDomain: "nextgenband.firebaseapp.com", 
        databaseURL: "https://nextgenband-default-rtdb.firebaseio.com", 
        projectId: "nextgenband", 
        storageBucket: "nextgenband.firebasestorage.app", 
        messagingSenderId: "251453757830", 
        appId: "1:251453757830:web:201c7945ef0eba901db407" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = "";
    const charList = ["김정한", "조현우", "이정우", "박희성", "임재남", "배상호"];

    // 요소 참조
    const lobby = document.getElementById('lobby');
    const gameRoom = document.getElementById('game-room');
    const chatBox = document.getElementById('chat-box');
    const bombDisplay = document.getElementById('bomb-holder');

    // 입장 버튼
    document.getElementById('entry-btn').onclick = () => {
        myName = document.getElementById('char-select').value;
        lobby.style.display = 'none';
        gameRoom.style.display = 'flex';
        document.getElementById('user-info').innerText = myName + " (접속 중)";
        
        // 접속 알림
        push(ref(db, 'chat'), { sender: "시스템", message: myName + "님이 입장했습니다.", type: "sys" });
    };

    // 메시지 전송
    const sendMessage = () => {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        push(ref(db, 'chat'), { sender: myName, message: input.value, timestamp: Date.now() });
        input.value = "";
    };
    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    // 폭탄 넘기기
    document.getElementById('pass-btn').onclick = () => {
        const targets = charList.filter(n => n !== myName);
        const next = targets[Math.floor(Math.random() * targets.length)];
        set(ref(db, 'gameState/bomb'), next);
    };

    // 실시간 데이터 수신 (채팅)
    onValue(ref(db, 'chat'), (snap) => {
        chatBox.innerHTML = "";
        snap.forEach(child => {
            const data = child.val();
            const isMine = data.sender === myName;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMine ? 'mine' : ''}`;
            msgDiv.innerHTML = `<div class="msg-sender">${data.sender}</div><div>${data.message}</div>`;
            chatBox.appendChild(msgDiv);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // 실시간 데이터 수신 (폭탄)
    onValue(ref(db, 'gameState/bomb'), (snap) => {
        const holder = snap.val() || "없음";
        bombDisplay.innerText = holder;
        if(holder === myName) {
            bombDisplay.style.fontSize = "2em";
            alert("⚠️ 당신이 폭탄을 가졌습니다!");
        } else {
            bombDisplay.style.fontSize = "1.2em";
        }
    });

</script>
</body>
</html>
"""

with open("index.html", "w", encoding="utf-8") as f:
    f.write(html_content)

print("index.html 파일이 생성되었습니다. 브라우저에서 열어보세요.")
"""
