<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEXT BATTLEGROUNDS v0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; margin: 0; }
        .log-window::-webkit-scrollbar { width: 4px; }
        .log-window::-webkit-scrollbar-thumb { background: #334155; }
        .sector { transition: all 0.3s; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 0.5rem; }
        .closed { background-color: #450a0a !important; color: #ef4444; opacity: 0.6; }
        .hidden { display: none !important; }
        #lobbyScreen { position: fixed; inset: 0; background-color: #0f172a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
    </style>
</head>
<body class="h-screen flex flex-col p-2 max-w-2xl mx-auto overflow-hidden">

    <div id="lobbyScreen">
        <h1 class="text-4xl font-black text-amber-500 italic mb-2">TEXT BATTLEGROUNDS</h1>
        <p class="text-slate-500 text-[10px] mb-8 uppercase tracking-widest">v0.2 Engine Running</p>
        
        <div id="loginBox" class="w-full max-w-xs space-y-4">
            <input id="nickInput" type="text" placeholder="닉네임 입력 (admin 등)" class="w-full bg-slate-800 border-2 border-slate-700 p-4 rounded-xl text-center font-bold text-white outline-none focus:border-amber-500 transition-all">
            <button onclick="joinLobby()" class="w-full bg-amber-600 py-4 rounded-xl font-black text-lg shadow-xl active:scale-95 transition-all text-white">전장 진입</button>
        </div>

        <div id="waitingBox" class="w-full max-w-xs space-y-4 hidden">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <p class="text-[10px] text-slate-500 mb-2 uppercase font-bold">Current Players</p>
                <div id="playerList" class="space-y-1 text-sm font-bold text-white"></div>
            </div>
            <button id="readyBtn" onclick="toggleReady()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-lg shadow-xl active:scale-95 transition-all text-white">READY</button>
            <p id="startMsg" class="text-xs text-rose-400 font-bold mt-4"></p>
        </div>
    </div>

    <div id="gameScreen" class="flex-1 flex flex-col hidden">
        <div class="grid grid-cols-4 gap-1 mb-2 bg-slate-800 p-2 rounded-xl border border-slate-700">
            <div class="text-center"><p class="text-[8px] text-slate-500 font-bold uppercase">HP</p><p id="hpDisp" class="text-sm font-black text-emerald-400">100</p></div>
            <div class="text-center"><p class="text-[8px] text-slate-500 font-bold uppercase">Zone</p><p id="timerDisp" class="text-sm font-black text-rose-500">60s</p></div>
            <div class="text-center"><p class="text-[8px] text-slate-500 font-bold uppercase">Weapon</p><p id="wpDisp" class="text-[10px] font-bold truncate">맨주먹</p></div>
            <div class="text-center"><button id="adminSkip" onclick="adminSkip()" class="hidden bg-rose-600 px-2 py-1 rounded text-[10px] font-black">SKIP</button></div>
        </div>
        <div id="mapGrid" class="grid grid-cols-5 gap-1 mb-2 aspect-square flex-none"></div>
        <div id="logWindow" class="log-window flex-1 bg-black/40 rounded-xl border border-slate-800 p-3 overflow-y-auto text-[11px] mb-2 leading-relaxed"></div>
        <div class="grid grid-cols-2 gap-2 mb-1">
            <button onclick="farmItem()" class="bg-amber-600 py-3 rounded-lg font-black text-xs text-white">🔍 파밍하기</button>
            <button onclick="showMove()" class="bg-slate-700 py-3 rounded-lg font-black text-xs text-white">🏃 이동</button>
        </div>
    </div>

    <div id="moveModal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-4">
        <div class="w-full max-w-xs"><div id="moveGrid" class="grid grid-cols-5 gap-2 mb-4"></div><button onclick="showMove()" class="w-full py-2 text-slate-500 font-bold">닫기</button></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M",
            authDomain: "nextgenband.firebaseapp.com",
            databaseURL: "https://nextgenband-default-rtdb.firebaseio.com",
            projectId: "nextgenband",
            storageBucket: "nextgenband.firebasestorage.app",
            messagingSenderId: "251453757830",
            appId: "1:251453757830:web:201c7945ef0eba901db407"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let myId = "";
        let myName = "";
        let isAdmin = false;
        let isReady = false;
        let myPos = { r: 2, c: 2 };
        let worldData = { state: 'waiting', timer: 60, closed: [] };

        window.joinLobby = () => {
            myName = document.getElementById('nickInput').value.trim();
            if(!myName) return alert("닉네임!");
            myId = "U_" + Math.random().toString(36).substring(2, 7);
            isAdmin = (myName === "admin");
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('waitingBox').classList.remove('hidden');
            if(isAdmin) document.getElementById('adminSkip').classList.remove('hidden');
            const myRef = ref(db, `game/players/${myId}`);
            set(myRef, { id: myId, name: myName, ready: false, pos: myPos, hp: 100 });
            onDisconnect(myRef).remove();
            syncLobby();
        };

        function syncLobby() {
            onValue(ref(db, 'game'), (snap) => {
                const data = snap.val() || {};
                const players = data.players || {};
                worldData = data.world || worldData;
                const pList = document.getElementById('playerList');
                pList.innerHTML = Object.values(players).map(p => `<div>${p.ready ? '✅' : '⏳'} ${p.name}</div>`).join('');
                const pArray = Object.values(players);
                const allReady = pArray.length > 0 && pArray.every(p => p.ready);
                const minCount = isAdmin ? 1 : 2;
                if(pArray.length >= minCount && allReady && worldData.state === 'waiting') {
                    document.getElementById('startMsg').innerText = "곧 시작됩니다...";
                    if(isAdmin) setTimeout(startGame, 2000);
                }
                if(worldData.state === 'playing') {
                    document.getElementById('lobbyScreen').classList.add('hidden');
                    document.getElementById('gameScreen').classList.remove('hidden');
                    updateUI();
                }
            });
        }

        window.toggleReady = () => {
            isReady = !isReady;
            update(ref(db, `game/players/${myId}`), { ready: isReady });
            document.getElementById('readyBtn').innerText = isReady ? "READY OK" : "READY";
        };

        function startGame() {
            update(ref(db, 'game/world'), { state: 'playing', timer: 60, closed: [] });
            startTimer();
        }

        function startTimer() {
            setInterval(() => {
                if(!isAdmin || worldData.state !== 'playing') return;
                if(worldData.timer > 0) update(ref(db, 'game/world'), { timer: worldData.timer - 1 });
                else closeSectors();
            }, 1000);
        }

        window.adminSkip = () => { if(isAdmin) closeSectors(); };

        function closeSectors() {
            const all = [];
            for(let i=0; i<5; i++) for(let j=0; j<5; j++) all.push(String.fromCharCode(65+i)+(j+1));
            const avail = all.filter(s => !worldData.closed.includes(s));
            if(avail.length <= 1) return;
            const toClose = [];
            for(let i=0; i<2; i++) {
                const r = Math.floor(Math.random() * avail.length);
                toClose.push(avail.splice(r, 1)[0]);
            }
            update(ref(db, 'game/world'), { closed: [...worldData.closed, ...toClose], timer: 60 });
        }

        function updateUI() {
            document.getElementById('timerDisp').innerText = worldData.timer + "s";
            const grid = document.getElementById('mapGrid');
            const mGrid = document.getElementById('moveGrid');
            grid.innerHTML = ''; mGrid.innerHTML = '';
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const addr = String.fromCharCode(65+r)+(c+1);
                    const isClosed = worldData.closed.includes(addr);
                    const isMe = (myPos.r === r && myPos.c === c);
                    const d = document.createElement('div');
                    d.className = `sector bg-slate-700 text-white ${isClosed?'closed':''} ${isMe?'ring-2 ring-emerald-500 bg-slate-600':''}`;
                    d.innerText = isMe ? "●" : addr;
                    grid.appendChild(d);
                    const b = document.createElement('button');
                    b.className = `p-2 rounded text-[10px] text-white ${isClosed?'bg-red-900':'bg-slate-700'}`;
                    b.innerText = addr;
                    b.onclick = () => { if(!isClosed) { myPos={r,c}; update(ref(db, `game/players/${myId}`), {pos:myPos}); showMove(); } };
                    mGrid.appendChild(b);
                }
            }
        }

        window.showMove = () => document.getElementById('moveModal').classList.toggle('hidden');
        window.farmItem = () => {
            const log = document.getElementById('logWindow');
            log.innerHTML += `<p class="text-slate-400">> 수색 중...</p>`;
            log.scrollTop = log.scrollHeight;
        };
    </script>
</body>
</html>
