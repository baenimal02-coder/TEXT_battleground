<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Tile War v0.06</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; min-width: 350px; }
        
        /* Lobby */
        #lobby h2 { margin-top: 0; color: var(--primary); }
        .input-group { margin: 25px 0; }
        #username-input { width: 80%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; transition: 0.2s; text-align: center; }
        #username-input:focus { border-color: var(--primary); }
        #start-btn { width: 90%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* Game Board */
        #game-screen { display: none; }
        .scoreboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; font-size: 13px; font-weight: bold; }
        .score-item { padding: 6px 12px; border-radius: 20px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        .grid { display: grid; grid-template-columns: repeat(10, 35px); grid-template-rows: repeat(10, 35px); gap: 4px; border: 6px solid #222; padding: 6px; background: #222; border-radius: 12px; margin: 0 auto; width: max-content; }
        .tile { background: #fff; border-radius: 4px; cursor: pointer; transition: background 0.05s; }
        .tile:hover { filter: brightness(0.85); }
        
        #my-status { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div id="app">
    <!-- 1. 로그인 로비 -->
    <div id="lobby">
        <h2>타일 점령전</h2>
        <p style="color:#666; font-size:14px;">사용하실 이름을 입력하세요.</p>
        <div class="input-group">
            <input type="text" id="username-input" placeholder="이름 (예: 홍길동)" autocomplete="off">
        </div>
        <button id="start-btn">게임 입장</button>
    </div>

    <!-- 2. 게임 화면 -->
    <div id="game-screen">
        <div class="scoreboard" id="scoreboard"></div>
        <div class="grid" id="tile-grid"></div>
        <div id="my-status"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, get, child } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M", 
        authDomain: "nextgenband.firebaseapp.com", 
        databaseURL: "https://nextgenband-default-rtdb.firebaseio.com", 
        projectId: "nextgenband", 
        storageBucket: "nextgenband.firebasestorage.app", 
        messagingSenderId: "251453757830", 
        appId: "1:251453757830:web:201c7945ef0eba901db407" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 20개의 명확히 구분되는 고대비 색상 팔레트 팩트
    const palette = [
        '#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', 
        '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', 
        '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', 
        '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'
    ];

    let myName = "";
    let myColor = "";

    // 게임 시작 로직
    document.getElementById('start-btn').onclick = async () => {
        const inputName = document.getElementById('username-input').value.trim();
        if(!inputName) return alert("이름을 입력해주세요.");
        
        myName = inputName;
        const dbRef = ref(db);
        
        try {
            // 1. 이미 등록된 유저인지 확인
            const userSnap = await get(child(dbRef, `users/${myName}`));
            if (userSnap.exists()) {
                myColor = userSnap.val().color;
            } else {
                // 2. 신규 유저일 경우 사용 중이지 않은 색상 탐색
                const allUsersSnap = await get(child(dbRef, `users`));
                const allUsers = allUsersSnap.val() || {};
                const usedColors = Object.values(allUsers).map(u => u.color);
                
                const availableColors = palette.filter(c => !usedColors.includes(c));
                // 남은 색상이 없으면 팔레트 내에서 랜덤 부여
                myColor = availableColors.length > 0 ? 
                    availableColors[Math.floor(Math.random() * availableColors.length)] : 
                    palette[Math.floor(Math.random() * palette.length)];
                
                await set(ref(db, `users/${myName}`), { color: myColor });
            }
            
            // 3. UI 전환 및 그리드 렌더링
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('my-status').innerHTML = `내 이름: <span style="color:${myColor};">${myName}</span>`;
            
            initGrid();
        } catch (error) {
            console.error("데이터베이스 연동 오류:", error);
            alert("서버 접속에 실패했습니다.");
        }
    };

    // 엔터키 지원
    document.getElementById('username-input').onkeypress = (e) => {
        if(e.key === 'Enter') document.getElementById('start-btn').click();
    };

    // 10x10 그리드 타일 생성
    function initGrid() {
        const gridDiv = document.getElementById('tile-grid');
        gridDiv.innerHTML = "";
        for(let i = 0; i < 100; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}`;
            // 클릭 시 서버에 소유자와 색상 덮어쓰기
            tile.onclick = () => {
                set(ref(db, `tiles/${i}`), { owner: myName, color: myColor });
            };
            gridDiv.appendChild(tile);
        }
    }

    // 타일 및 점수 실시간 동기화 (팩트: 변경사항 발생 시 모든 클라이언트 동시 업데이트)
    onValue(ref(db, 'tiles'), (snap) => {
        const data = snap.val() || {};
        const scores = {};

        // 1. 그리드 색상 업데이트 및 점수 계산
        for(let i = 0; i < 100; i++) {
            const tileEl = document.getElementById(`tile-${i}`);
            if(!tileEl) continue;
            
            if(data[i]) {
                tileEl.style.background = data[i].color;
                
                // 스코어 집계
                const owner = data[i].owner;
                if(!scores[owner]) {
                    scores[owner] = { count: 0, color: data[i].color };
                }
                scores[owner].count++;
            } else {
                tileEl.style.background = "#fff";
            }
        }

        // 2. 점수판 렌더링 (점수 높은 순 정렬)
        const scoreDiv = document.getElementById('scoreboard');
        scoreDiv.innerHTML = "";
        
        const sortedScores = Object.entries(scores).sort((a, b) => b[1].count - a[1].count);
        
        sortedScores.forEach(([owner, info]) => {
            const item = document.createElement('div');
            item.className = 'score-item';
            item.style.background = info.color;
            item.innerText = `${owner}: ${info.count}`;
            scoreDiv.appendChild(item);
        });
    });
</script>
</body>
</html>
