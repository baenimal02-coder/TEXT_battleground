<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기계연 배틀그라운드 v0.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; margin: 0; overflow: hidden; height: 100vh; }
        /* 맵 섹터 스타일 - 고정 격자 */
        .sector { transition: all 0.2s; border: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; border-radius: 4px; background: #1e293b; color: #475569; }
        .closed { background-color: #450a0a !important; border-color: #7f1d1d !important; color: #f87171 !important; opacity: 0.8; }
        .is-me { background-color: #065f46 !important; border-color: #10b981 !important; color: #fff !important; box-shadow: inset 0 0 10px #10b981; position: relative; z-index: 10; }
        .is-me::after { content: '●'; font-size: 10px; position: absolute; bottom: 2px; right: 2px; color: #10b981; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .log-window::-webkit-scrollbar { width: 4px; }
        .log-window::-webkit-scrollbar-thumb { background: #334155; }
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background-color: rgba(0,0,0,0.98); z-index: 1000; display: flex; flex-direction: column; padding: 1.5rem; }
    </style>
</head>
<body class="flex flex-col max-w-lg mx-auto">

    <div id="lobbyScreen" class="fixed inset-0 bg-slate-900 z-[2000] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-3xl font-black text-amber-500 italic mb-8 uppercase tracking-widest">기계연 배틀그라운드</h1>
        <div id="loginBox" class="w-full max-w-xs space-y-4">
            <input id="nickInput" type="text" placeholder="닉네임 입력" class="w-full bg-slate-800 border-2 border-slate-700 p-4 rounded-xl text-center text-white outline-none focus:border-amber-500">
            <button onclick="joinLobby()" class="w-full bg-amber-600 py-4 rounded-xl font-black text-white text-lg active:scale-95 transition-all">전장 진입</button>
        </div>
        <div id="waitingBox" class="w-full max-w-xs space-y-4 hidden">
            <div id="playerList" class="bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-1 text-sm font-bold text-white text-center"></div>
            <button id="readyBtn" onclick="toggleReady()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-white text-lg shadow-xl">READY</button>
            <p id="startMsg" class="text-xs text-rose-400 font-bold mt-4 text-center"></p>
        </div>
    </div>

    <div id="gameScreen" class="flex flex-col h-screen hidden p-2">
        <div class="flex-none mb-2">
            <h1 class="text-center text-amber-500 font-black text-sm italic mb-1 uppercase tracking-tighter">기계연 배틀그라운드 v0.9</h1>
            <div class="grid grid-cols-4 gap-1 bg-slate-800 p-2 rounded-xl border border-slate-700 shadow-lg">
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold uppercase">HP</p><p id="hpDisp" class="text-xs font-black text-emerald-400">100</p></div>
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold uppercase">ZONE</p><p id="timerDisp" class="text-xs font-black text-rose-500">60s</p></div>
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold uppercase">WEAPON</p><p id="wpDisp" class="text-[9px] font-bold text-amber-300 truncate">맨주먹</p></div>
                <div class="text-center"><p class="text-[7px] text-slate-500 font-bold uppercase">ARMOR</p><p id="arDisp" class="text-[9px] font-bold text-blue-300 truncate">없음</p></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-h-0">
            <div class="h-1/2 p-1 bg-slate-900 rounded-xl border border-slate-800 shadow-inner overflow-hidden">
                <div id="mapGrid" class="grid grid-cols-5 grid-rows-5 gap-1 h-full w-full">
                    </div>
            </div>

            <div id="logWindow" class="h-1/2 mt-2 bg-black/60 rounded-xl border border-slate-800 p-3 overflow-y-auto text-[11px] leading-relaxed shadow-inner">
                <p class="text-slate-500 font-bold uppercase tracking-widest mb-2 border-b border-slate-800 pb-1">[SYSTEM LOG]</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 flex-none mt-2 mb-1">
            <button onclick="farmItem()" id="farmBtn" class="bg-amber-600 py-4 rounded-xl font-black text-xs text-white active:bg-amber-500">🔍파밍(0/2)</button>
            <button onclick="showMove()" class="bg-slate-700 py-4 rounded-xl font-black text-xs text-white active:bg-slate-600">🏃이동</button>
            <button onclick="showManual()" class="bg-indigo-600 py-4 rounded-xl font-black text-xs text-white active:bg-indigo-500">📖도감</button>
        </div>
        <button id="adminSkip" onclick="adminSkip()" class="hidden bg-rose-900 w-full py-1 rounded text-[9px] font-black text-white mb-1 uppercase">Admin: Next Phase</button>
    </div>

    <div id="moveModal" class="modal hidden">
        <h2 class="text-center text-white font-black mb-6 uppercase tracking-widest italic border-b border-slate-800 pb-2">Target Sector</h2>
        <div id="moveGrid" class="grid grid-cols-5 gap-2 mb-8"></div>
        <button onclick="showMove()" class="mt-auto py-4 bg-slate-800 rounded-xl text-slate-400 font-bold tracking-widest">CLOSE</button>
    </div>

    <div id="manualModal" class="modal hidden">
        <h2 class="text-xl font-black text-indigo-400 mb-6 italic text-center uppercase border-b border-indigo-900 pb-2">Survivor Manual</h2>
        <div id="manualContent" class="flex-1 overflow-y-auto space-y-4 text-[11px] pr-2"></div>
        <button onclick="showManual()" class="mt-4 py-4 bg-slate-800 rounded-xl font-bold tracking-widest">CLOSE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M", authDomain: "nextgenband.firebaseapp.com", databaseURL: "https://nextgenband-default-rtdb.firebaseio.com", projectId: "nextgenband", storageBucket: "nextgenband.firebasestorage.app", messagingSenderId: "251453757830", appId: "1:251453757830:web:201c7945ef0eba901db407" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, isAdmin, isReady = false, myPos = { r: 2, c: 2 }, myHP = 100, myWeapon = "맨주먹", myArmor = "없음", farmCount = 0;
        let worldData = { state: 'waiting', timer: 60, closed: [] };

        window.joinLobby = () => {
            myName = document.getElementById('nickInput').value.trim(); if(!myName) return;
            myId = "U_" + Math.random().toString(36).substring(2, 7); isAdmin = (myName === "admin");
            document.getElementById('loginBox').classList.add('hidden'); document.getElementById('waitingBox').classList.remove('hidden');
            if(isAdmin) document.getElementById('adminSkip').classList.remove('hidden');
            set(ref(db, `game/players/${myId}`), { id: myId, name: myName, ready: false, pos: myPos, hp: 100 });
            onDisconnect(ref(db, `game/players/${myId}`)).remove(); syncLobby();
        };

        function syncLobby() {
            onValue(ref(db, 'game'), (snap) => {
                const data = snap.val() || {}; worldData = data.world || worldData;
                const players = data.players || {};
                document.getElementById('playerList').innerHTML = Object.values(players).map(p => `<div>${p.ready?'✅':'⏳'} ${p.name}</div>`).join('');
                if(Object.values(players).length >= (isAdmin?1:2) && Object.values(players).every(p=>p.ready) && worldData.state==='waiting') {
                    if(isAdmin) setTimeout(()=>update(ref(db, 'game/world'), {state:'playing', timer:60, closed:[]}), 1500);
                }
                if(worldData.state === 'playing') { 
                    document.getElementById('lobbyScreen').classList.add('hidden'); 
                    document.getElementById('gameScreen').classList.remove('hidden'); 
                    updateUI(); 
                }
            });
        }

        window.toggleReady = () => { isReady=!isReady; update(ref(db, `game/players/${myId}`), {ready:isReady}); };
        window.adminSkip = () => { if(isAdmin) closeSectors(); };

        function closeSectors() {
            const all = []; for(let i=0; i<5; i++) for(let j=0; j<5; j++) all.push(String.fromCharCode(65+i)+(j+1));
            const avail = all.filter(s => !worldData.closed.includes(s));
            if(avail.length <= 1) return;
            const toClose = []; for(let i=0; i<2; i++) { if(avail.length>0) toClose.push(avail.splice(Math.floor(Math.random()*avail.length), 1)[0]); }
            update(ref(db, 'game/world'), { closed: [...worldData.closed, ...toClose], timer: 60 });
        }

        function updateUI() {
            document.getElementById('hpDisp').innerText = myHP;
            document.getElementById('timerDisp').innerText = (worldData.timer || 60) + "s";
            document.getElementById('wpDisp').innerText = myWeapon;
            document.getElementById('arDisp').innerText = myArmor;
            document.getElementById('farmBtn').innerText = `🔍파밍(${farmCount}/2)`;

            const grid = document.getElementById('mapGrid'); grid.innerHTML = '';
            const mGrid = document.getElementById('moveGrid'); mGrid.innerHTML = '';

            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const rowName = String.fromCharCode(65+r);
                    const colName = (c+1);
                    const addr = `${rowName}-${colName}`; // 디렉터님 요청대로 하이픈 추가
                    const addrKey = `${rowName}${colName}`;
                    
                    const isMe = (myPos.r===r && myPos.c===c);
                    const isClosed = worldData.closed.includes(addrKey);
                    
                    // 상단 격자 맵 생성
                    const d = document.createElement('div');
                    d.className = `sector ${isClosed?'closed':''} ${isMe?'is-me':''}`;
                    d.innerText = addr;
                    grid.appendChild(d);

                    // 이동 모달 버튼 생성
                    const b = document.createElement('button');
                    b.className = `p-3 rounded-lg text-xs font-bold text-white ${isClosed?'bg-red-950 opacity-40':'bg-slate-800 hover:bg-emerald-700'}`;
                    b.innerText = addr;
                    if(!isClosed) b.onclick = () => moveTo(r, c, addrKey, addr);
                    mGrid.appendChild(b);
                }
            }
        }

        window.moveTo = (r, c, addrKey, addr) => {
            myPos = { r, c }; farmCount = 0;
            update(ref(db, `game/players/${myId}`), { pos: myPos });
            document.getElementById('moveModal').classList.add('hidden');
            addLog(`--- ${addr} 구역으로 이동했습니다 ---`, "text-white font-bold border-y border-slate-800 my-1 py-1");
            updateUI();
        };

        window.farmItem = () => {
            if(farmCount >= 2) return addLog("이미 샅샅이 수색했습니다.", "text-amber-200 font-bold");
            farmCount++; updateUI();
            addLog(`수색 중... (${farmCount}/2)`, "text-amber-500 animate-pulse");
            
            setTimeout(() => {
                const rand = Math.random();
                if(rand < 0.45) addLog("아무것도 찾지 못했습니다.", "text-slate-500");
                else if(rand < 0.75) {
                    addLog("붕대 세트를 발견했습니다! (+15 HP)", "text-emerald-400 font-bold");
                    myHP = Math.min(100, myHP + 15);
                } else {
                    const items = ["리볼버", "소방 도끼", "경찰 조끼 (Lv.1)", "크로스보우", "군용 조끼 (Lv.2)"];
                    const res = items[Math.floor(Math.random()*items.length)];
                    if(res.includes("조끼")) myArmor = res; else myWeapon = res;
                    addLog(`[${res}] 장비를 획득했습니다!`, "text-sky-400 font-black");
                }
                updateUI();
            }, 700);
        };

        function addLog(msg, clr="text-slate-400") {
            const l = document.getElementById('logWindow');
            l.innerHTML += `<p class="${clr} mb-1">> ${msg}</p>`;
            l.scrollTop = l.scrollHeight;
        }

        window.showMove = () => document.getElementById('moveModal').classList.toggle('hidden');
        window.showManual = () => {
            const m = document.getElementById('manualModal'); m.classList.toggle('hidden');
            document.getElementById('manualContent').innerHTML = `
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p class="font-black text-amber-400 mb-3 border-b border-amber-900 pb-1">🗡️ WEAPONS</p>
                    <div class="space-y-1 text-slate-300">
                        <p>• 쇠파이프 (D:15/N:10)</p><p>• 소방도끼 (D:25/N:7)</p><p>• 리볼버 (D:55/N:6)</p><p>• 크로스보우 (D:45/N:3)</p>
                    </div>
                </div>
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p class="font-black text-blue-400 mb-3 border-b border-blue-900 pb-1">🛡️ ARMORS</p>
                    <div class="space-y-1 text-slate-300">
                        <p>• 경찰 조끼 (-20%)</p><p>• 군용 조끼 (-40%)</p><p>• 전술 조끼 (-60%)</p>
                    </div>
                </div>
            `;
        };
        
        setInterval(() => { if(isAdmin && worldData.state === 'playing') { if(worldData.timer > 0) update(ref(db, 'game/world'), {timer: worldData.timer - 1}); else closeSectors(); }}, 1000);
    </script>
</body>
</html>
