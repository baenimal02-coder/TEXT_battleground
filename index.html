<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기계연 배틀그라운드 v0.03 Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Courier New', Courier, monospace; touch-action: manipulation; margin: 0; overflow: hidden; height: 100vh; }
        /* 격자 스타일 고정 */
        .grid-map { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); gap: 4px; height: 100%; width: 100%; }
        .sector { border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; border-radius: 6px; background: #1e293b; color: #64748b; }
        .closed { background-color: #450a0a !important; border-color: #ef4444 !important; color: #ef4444 !important; }
        /* 빨간색 점멸 도트 */
        .is-me { border-color: #ef4444 !important; color: #fff !important; background-color: #064e3b !important; position: relative; }
        .is-me::after { content: '●'; color: #ef4444; position: absolute; top: 2px; right: 4px; animation: blink 0.8s infinite; font-size: 14px; text-shadow: 0 0 8px #ef4444; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .log-window::-webkit-scrollbar { width: 4px; }
        .log-window::-webkit-scrollbar-thumb { background: #334155; }
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background-color: rgba(0,0,0,0.98); z-index: 1000; display: flex; flex-direction: column; padding: 1.5rem; }
    </style>
</head>
<body class="flex flex-col max-w-lg mx-auto h-screen">

    <div id="lobbyScreen" class="fixed inset-0 bg-slate-900 z-[2000] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-3xl font-black text-amber-500 italic mb-2 uppercase tracking-widest">기계연 배틀그라운드</h1>
        <p class="text-emerald-500 font-bold text-[10px] mb-10 tracking-[0.3em] uppercase underline decoration-emerald-900">Build v0.03 Beta</p>
        <div id="loginBox" class="w-full max-w-xs space-y-4">
            <input id="nickInput" type="text" placeholder="닉네임 입력" class="w-full bg-slate-800 border-2 border-slate-700 p-4 rounded-xl text-center text-white outline-none focus:border-amber-500">
            <button onclick="joinLobby()" class="w-full bg-amber-600 py-4 rounded-xl font-black text-white text-lg active:scale-95 shadow-2xl">전장 진입</button>
        </div>
        <div id="waitingBox" class="w-full max-w-xs space-y-4 hidden">
            <div id="playerList" class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-white font-bold space-y-1 mb-4 text-center"></div>
            <button id="readyBtn" onclick="toggleReady()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-white text-lg">READY</button>
            <p id="startMsg" class="text-xs text-rose-400 font-bold mt-4 animate-pulse"></p>
        </div>
    </div>

    <div id="landingScreen" class="fixed inset-0 bg-slate-900 z-[1500] flex flex-col p-6 hidden">
        <h2 class="text-2xl font-black text-amber-500 mb-2 italic text-center uppercase">Landing</h2>
        <p class="text-center text-xs text-slate-400 mb-6 font-bold uppercase underline decoration-amber-900">낙하할 구역을 선택하십시오.</p>
        <div class="flex-1 min-h-0 bg-slate-950 p-2 rounded-xl border border-slate-800">
            <div id="landingGrid" class="grid-map"></div>
        </div>
    </div>

    <div id="gameScreen" class="flex flex-col h-full hidden p-2">
        <div class="flex-none mb-2">
            <h1 class="text-center text-amber-500 font-black text-sm italic mb-1 uppercase tracking-tighter">기계연 배틀그라운드 v0.03</h1>
            <div class="grid grid-cols-4 gap-1 bg-slate-800 p-2 rounded-xl border border-slate-700 shadow-lg">
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold">HP</p><p id="hpDisp" class="text-xs font-black text-emerald-400">100</p></div>
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold">ZONE</p><p id="timerDisp" class="text-xs font-black text-rose-500">60s</p></div>
                <div class="text-center border-r border-slate-700"><p class="text-[7px] text-slate-500 font-bold">WEAPON</p><p id="wpDisp" class="text-[9px] font-bold text-amber-300 truncate">맨주먹</p></div>
                <div class="text-center"><p class="text-[7px] text-slate-500 font-bold">ARMOR</p><p id="arDisp" class="text-[9px] font-bold text-blue-300 truncate">없음</p></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-h-0">
            <div class="basis-1/2 p-1 bg-slate-900 rounded-xl border border-slate-800 shadow-inner overflow-hidden mb-2">
                <div id="mapGrid" class="grid-map"></div>
            </div>
            <div id="logWindow" class="basis-1/2 bg-black/60 rounded-xl border border-slate-800 p-3 overflow-y-auto text-[11px] leading-relaxed shadow-inner">
                <p class="text-slate-500 font-bold uppercase border-b border-slate-800 pb-1 mb-2">[SYSTEM LOG]</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 flex-none mt-2 mb-1">
            <button onclick="farmItem()" id="farmBtn" class="bg-amber-600 py-4 rounded-xl font-black text-xs text-white active:bg-amber-500">🔍파밍(0/2)</button>
            <button onclick="showMove()" class="bg-slate-700 py-4 rounded-xl font-black text-xs text-white">🏃이동</button>
            <button onclick="showManual()" class="bg-indigo-600 py-4 rounded-xl font-black text-xs text-white">📖도감</button>
        </div>
        <button id="adminSkip" onclick="adminSkip()" class="hidden bg-rose-900 w-full py-1 rounded text-[9px] font-black text-white mb-1 uppercase tracking-widest">Admin: Next Phase</button>
    </div>

    <div id="moveModal" class="modal hidden">
        <h2 class="text-center text-white font-black mb-6 uppercase italic">Select Target</h2>
        <div id="moveGrid" class="grid-map h-2/3"></div>
        <button onclick="showMove()" class="mt-auto py-4 bg-slate-800 rounded-xl text-slate-400 font-bold uppercase">Close</button>
    </div>

    <div id="manualModal" class="modal hidden">
        <h2 class="text-xl font-black text-indigo-400 mb-6 italic text-center border-b border-indigo-900 pb-2">Manual</h2>
        <div id="manualContent" class="flex-1 overflow-y-auto space-y-4 text-xs">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <p class="font-black text-amber-400 mb-3 border-b border-amber-900 pb-1">🗡️ WEAPONS</p>
                <div class="space-y-1 text-slate-300">
                    <p>• 쇠파이프 (D: 15) | • 소방 도끼 (D: 25)</p>
                    <p>• 리볼버 (D: 55) | • 크로스보우 (D: 45)</p>
                </div>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <p class="font-black text-blue-400 mb-3 border-b border-blue-900 pb-1">🛡️ ARMORS</p>
                <div class="space-y-1 text-slate-300">
                    <p>• 경찰 조끼 (-20%) | • 군용 조끼 (-40%)</p>
                    <p>• 전술 조끼 (-60%)</p>
                </div>
            </div>
        </div>
        <button onclick="showManual()" class="mt-6 py-4 bg-slate-800 rounded-xl font-bold">CLOSE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBjqzM3ScDSoINSMiCukjFG6z7MBjinI1M", authDomain: "nextgenband.firebaseapp.com", databaseURL: "https://nextgenband-default-rtdb.firebaseio.com", projectId: "nextgenband", storageBucket: "nextgenband.firebasestorage.app", messagingSenderId: "251453757830", appId: "1:251453757830:web:201c7945ef0eba901db407" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, isAdmin, isReady = false, myPos = null, myHP = 100, myWeapon = "맨주먹", myArmor = "없음", farmCount = 0;
        let worldData = { state: 'waiting', timer: 60, closed: [] };

        window.joinLobby = () => {
            myName = document.getElementById('nickInput').value.trim(); if(!myName) return;
            myId = "U_" + Math.random().toString(36).substring(2, 7); isAdmin = (myName === "admin");
            document.getElementById('loginBox').classList.add('hidden'); document.getElementById('waitingBox').classList.remove('hidden');
            if(isAdmin) document.getElementById('adminSkip').classList.remove('hidden');
            set(ref(db, `game/players/${myId}`), { id: myId, name: myName, ready: false, hp: 100 });
            onDisconnect(ref(db, `game/players/${myId}`)).remove(); syncLobby();
        };

        function syncLobby() {
            onValue(ref(db, 'game'), (snap) => {
                const data = snap.val() || {}; worldData = data.world || { state: 'waiting', timer: 60, closed: [] };
                const players = data.players || {};
                document.getElementById('playerList').innerHTML = Object.values(players).map(p => `<div>${p.ready?'✅':'⏳'} ${p.name}</div>`).join('');
                
                if(Object.values(players).length >= (isAdmin?1:2) && Object.values(players).every(p=>p.ready) && worldData.state==='waiting') {
                    if(isAdmin) setTimeout(()=>update(ref(db, 'game/world'), {state:'playing', timer:60, closed:[]}), 1000);
                }

                if(worldData.state === 'playing') {
                    document.getElementById('lobbyScreen').classList.add('hidden');
                    if(!myPos) {
                        document.getElementById('landingScreen').classList.remove('hidden');
                        renderLandingGrid();
                    } else {
                        document.getElementById('landingScreen').classList.add('hidden');
                        document.getElementById('gameScreen').classList.remove('hidden');
                        updateUI();
                    }
                }
            });
        }

        function renderLandingGrid() {
            const grid = document.getElementById('landingGrid'); grid.innerHTML = '';
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const row = String.fromCharCode(65+r); const addr = `${row}-${c+1}`;
                    const b = document.createElement('button');
                    b.className = "sector hover:bg-emerald-800 transition-colors cursor-pointer";
                    b.innerText = addr;
                    b.onclick = () => { myPos = { r, c }; update(ref(db, `game/players/${myId}`), { pos: myPos }); addLog(`${addr} 구역에 강하했습니다.`); };
                    grid.appendChild(b);
                }
            }
        }

        window.toggleReady = () => { isReady=!isReady; update(ref(db, `game/players/${myId}`), {ready:isReady}); };
        window.adminSkip = () => { if(isAdmin) closeSectors(); };

        function closeSectors() {
            const all = []; for(let i=0; i<5; i++) for(let j=0; j<5; j++) all.push(String.fromCharCode(65+i)+(j+1));
            const avail = all.filter(s => !(worldData.closed || []).includes(s));
            if(avail.length <= 1) return;
            const toClose = []; for(let i=0; i<2; i++) { if(avail.length>0) toClose.push(avail.splice(Math.floor(Math.random()*avail.length), 1)[0]); }
            update(ref(db, 'game/world'), { closed: [...(worldData.closed || []), ...toClose], timer: 60 });
        }

        function updateUI() {
            document.getElementById('hpDisp').innerText = myHP;
            document.getElementById('timerDisp').innerText = (worldData.timer || 0) + "s";
            document.getElementById('wpDisp').innerText = myWeapon;
            document.getElementById('arDisp').innerText = myArmor;
            document.getElementById('farmBtn').innerText = `🔍파밍(${farmCount}/2)`;

            const grid = document.getElementById('mapGrid'); grid.innerHTML = '';
            const mGrid = document.getElementById('moveGrid'); mGrid.innerHTML = '';
            const closedArr = worldData.closed || [];

            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const row = String.fromCharCode(65+r); const addr = `${row}-${c+1}`; const addrKey = `${row}${c+1}`;
                    const isMe = (myPos && myPos.r===r && myPos.c===c);
                    const isClosed = closedArr.includes(addrKey);
                    
                    const d = document.createElement('div');
                    d.className = `sector ${isClosed?'closed':''} ${isMe?'is-me':''}`;
                    d.innerText = addr;
                    grid.appendChild(d);

                    const b = document.createElement('button');
                    b.className = `sector ${isClosed?'closed bg-opacity-20':'hover:bg-emerald-800'}`;
                    b.innerText = addr;
                    if(!isClosed) b.onclick = () => moveTo(r, c, addrKey, addr);
                    mGrid.appendChild(b);
                }
            }
        }

        window.moveTo = (r, c, addrKey, addr) => {
            myPos = { r, c }; farmCount = 0;
            update(ref(db, `game/players/${myId}`), { pos: myPos });
            document.getElementById('moveModal').classList.add('hidden');
            addLog(`--- ${addr} 이동 ---`, "text-white font-bold py-1 my-1 border-y border-slate-800");
            updateUI();
        };

        window.farmItem = () => {
            if(farmCount >= 2) return addLog("수색할 곳이 없습니다.", "text-amber-200");
            farmCount++; updateUI();
            addLog(`수색 중... (${farmCount}/2)`, "text-amber-500 animate-pulse");
            
            setTimeout(() => {
                const rand = Math.random();
                if(rand < 0.4) addLog("아무것도 찾지 못했습니다.");
                else if(rand < 0.7) {
                    addLog("붕대 발견! (+15 HP)", "text-emerald-400 font-bold");
                    myHP = Math.min(100, myHP + 15);
                } else if(rand < 0.9) {
                    const ws = ["리볼버", "소방 도끼", "크로스보우"];
                    myWeapon = ws[Math.floor(Math.random()*ws.length)];
                    addLog(`[${myWeapon}] 장착 완료!`, "text-sky-400 font-black");
                } else {
                    const ars = ["경찰 조끼 (Lv.1)", "군용 조끼 (Lv.2)"];
                    myArmor = ars[Math.floor(Math.random()*ars.length)];
                    addLog(`[${myArmor}] 획득!`, "text-indigo-400 font-black");
                }
                updateUI();
            }, 600);
        };

        function addLog(msg, clr="text-slate-400") {
            const l = document.getElementById('logWindow');
            l.innerHTML += `<p class="${clr} mb-1">> ${msg}</p>`;
            l.scrollTop = l.scrollHeight;
        }

        window.showMove = () => document.getElementById('moveModal').classList.toggle('hidden');
        window.showManual = () => document.getElementById('manualModal').classList.toggle('hidden');
        
        setInterval(() => {
            if(isAdmin && worldData.state === 'playing') {
                const cur = worldData.timer || 60;
                if(cur > 0) update(ref(db, 'game/world'), {timer: cur - 1});
                else closeSectors();
            }
        }, 1000);
    </script>
</body>
</html>
